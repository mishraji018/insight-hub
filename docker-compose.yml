version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=insight_hub
      - POSTGRES_USER=insight_user
      - POSTGRES_PASSWORD=insight_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insight_user -d insight_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: .
      dockerfile: docker/Dockerfile.backend
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgres://insight_user:insight_pass@db:5432/insight_hub
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    environment:
      - DATABASE_URL=postgresql://insight_user:insight_pass@db:5432/insight_hub
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
