name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Linting Tools
        run: |
          pip install flake8 black isort
      - name: Run Flake8
        run: flake8 backend --exclude=migrations
      - name: Run Black Check
        run: black --check backend
      - name: Run Isort Check
        run: isort --check-only backend

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest-cov
      - name: Run Tests with Coverage
        env:
          SECRET_KEY: "test-secret-key"
          DEBUG: "True"
          DB_NAME: "test_db"
          CELERY_BROKER_URL: "redis://localhost:6379/0"
        run: |
          cd backend
          pytest --cov=analytics --cov=predictions --cov-fail-under=80

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker Image
        run: |
          cd backend
          docker build -t insight-hub-backend:latest -f Dockerfile.prod .
